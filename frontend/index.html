<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="theme-color" content="#2E7D32" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    
    <!-- Primary Meta Tags -->
    <title>AgriLink - East Hararghe Agricultural Products E-Commerce Platform</title>
    <meta name="title" content="AgriLink - East Hararghe Agricultural Products E-Commerce Platform" />
    <meta name="description" content="Connect directly with East Hararghe farmers. Buy premium Ethiopian coffee, teff, khat, and fresh agricultural products online. Secure payments, fast delivery across Ethiopia." />
    <meta name="keywords" content="Ethiopian coffee, East Hararghe, agricultural products, teff, khat, fresh produce, farmers market, online shopping, Ethiopia agriculture, Harar coffee, organic farming" />
    <meta name="author" content="AgriLink" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://agrilink.et/" />
    <meta property="og:title" content="AgriLink - East Hararghe Agricultural Products E-Commerce Platform" />
    <meta property="og:description" content="Connect directly with East Hararghe farmers. Buy premium Ethiopian coffee, teff, khat, and fresh agricultural products online." />
    <meta property="og:image" content="https://agrilink.et/og-image.jpg" />
    <meta property="og:site_name" content="AgriLink" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://agrilink.et/" />
    <meta property="twitter:title" content="AgriLink - East Hararghe Agricultural Products E-Commerce Platform" />
    <meta property="twitter:description" content="Connect directly with East Hararghe farmers. Buy premium Ethiopian coffee, teff, khat, and fresh agricultural products online." />
    <meta property="twitter:image" content="https://agrilink.et/twitter-image.jpg" />
    
    <!-- Additional SEO -->
    <link rel="canonical" href="https://agrilink.et/" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <meta name="distribution" content="global" />
    <meta name="rating" content="general" />
    
    <!-- Geolocation -->
    <meta name="geo.region" content="ET-OR" />
    <meta name="geo.placename" content="East Hararghe" />
    <meta name="geo.position" content="9.0;41.0" />
    <meta name="ICBM" content="9.0, 41.0" />
    
    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AgriLink" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="AgriLink" />
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Vite handles NODE_ENV automatically -->
    <style>
      #root { min-height: 100vh; display: flex; flex-direction: column; }
      body { margin: 0; padding: 0; background-color: white; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
